<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HazeLink — Nome do Negócio</title>
  <style>
    /* =============================================
       CONFIGURAÇÃO DO CLIENTE — edite aqui
    ============================================= */
    :root {
      --brand:    #FF6B35;
      --brand-2:  #1A1A2E;
      --card-bg:  #ffffff;
      --text:     #1a1a1a;
      --muted:    #888888;
    }

    /* =============================================
       BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* =============================================
       VÍDEO FULLSCREEN
    ============================================= */
    .video-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .video-layer img,
    .video-layer video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* gradiente de baixo para guiar o swipe */
    .video-layer::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
      pointer-events: none;
    }

    /* =============================================
       SWIPE HINT
    ============================================= */
    .swipe-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .swipe-hint.hidden { opacity: 0; }

    .swipe-hint svg {
      animation: float 1.6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    /* =============================================
       CARD PANEL
    ============================================= */
    .card-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      max-height: 92vh;
      background: var(--card-bg);
      border-radius: 26px 26px 0 0;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .card-panel.open    { transform: translateY(0); }
    .card-panel.no-anim { transition: none; }

    /* handle bar */
    .card-handle {
      width: 38px;
      height: 4px;
      background: rgba(0,0,0,0.15);
      border-radius: 2px;
      margin: 13px auto 0;
      cursor: pointer;
    }

    /* =============================================
       CONTEÚDO DO CARD
    ============================================= */
    .card-body {
      padding: 18px 24px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .biz-logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--brand);
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      margin-bottom: 14px;
    }

    /* Nome */
    .biz-name {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    /* Tagline */
    .biz-tagline {
      font-size: 13.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      margin-bottom: 22px;
      max-width: 270px;
    }

    /* Divisor */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.07);
      margin-bottom: 22px;
    }

    /* ===== REDES SOCIAIS ===== */
    .socials {
      display: flex;
      gap: 14px;
      margin-bottom: 26px;
    }

    .social-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.13s, background 0.13s;
    }

    .social-btn:active {
      transform: scale(0.90);
      background: rgba(0,0,0,0.10);
    }

    /* ===== BOTÕES DE AÇÃO ===== */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 11px;
      width: 100%;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 15px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      transition: transform 0.13s, opacity 0.13s;
    }

    .action-btn:active { transform: scale(0.97); opacity: 0.88; }

    .action-btn.whatsapp  { background: #25D366; }
    .action-btn.maps      { background: #4285F4; }
    .action-btn.cardapio  { background: var(--brand); }
    .action-btn.agendar   { background: var(--brand-2); }

    .action-btn svg   { flex-shrink: 0; }
    .action-btn span  { flex: 1; }

    /* ===== RODAPÉ ===== */
    .footer {
      margin-top: 26px;
      font-size: 11px;
      color: rgba(0,0,0,0.28);
      text-align: center;
      letter-spacing: 0.04em;
    }

    .footer strong { color: rgba(0,0,0,0.42); }
  </style>
</head>
<body>

  <!-- ========== FUNDO ========== -->
  <div class="video-layer">

  <!-- ========== SWIPE HINT ========== -->

    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"

  <!-- ========== CARD ========== -->

      <!-- Botões de ação -->

          </svg>
          <span>Falar no WhatsApp</span>
        </a>

        <a href="https://maps.google.com/?q=SEU+ENDERECO" class="action-btn maps" target="_blank" rel="noopener">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      </div>

      <p class="footer">Feito com <strong>HazeLink</strong> · Haze Digital</p>
    </div>
  </div>

  <script>
    const panel  = document.getElementById('cardPanel');
    const hint   = document.getElementById('swipeHint');
    const handle = document.getElementById('cardHandle');

    let startY   = 0;
    let lastY    = 0;
    let dragging = false;
    let isOpen   = false;

    /* ---- helpers ---- */
    function open() {
      isOpen = true;
      panel.classList.remove('no-anim');
      panel.classList.add('open');
      panel.style.transform = '';
      hint.classList.add('hidden');
    }

    function close() {
      isOpen = false;
      panel.classList.remove('no-anim');
      panel.classList.remove('open');
      panel.style.transform = '';
      hint.classList.remove('hidden');
    }

    function snapBack() {
      panel.classList.remove('no-anim');
      panel.style.transform = '';
      isOpen ? panel.classList.add('open') : panel.classList.remove('open');
    }

    /* ---- touch ---- */
    document.addEventListener('touchstart', (e) => {
      startY   = e.touches[0].clientY;
      lastY    = startY;
      dragging = true;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      e.preventDefault();
      lastY = e.touches[0].clientY;
      const diff = startY - lastY;

      panel.classList.add('no-anim');

      if (!isOpen && diff > 5) {
        const p = Math.min(diff / 220, 1);
        panel.style.transform = `translateY(${(1 - p) * 100}%)`;
      }

      if (isOpen && diff < -5) {
        const pull = Math.max(0, -diff);
        panel.style.transform = `translateY(${pull}px)`;
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      const diff = startY - lastY;

      if (!isOpen && diff > 70)  { open(); }
      else if (isOpen && diff < -70) { close(); }
      else { snapBack(); }
    });

    /* ---- handle tap ---- */
    handle.addEventListener('click', () => isOpen ? close() : open());

  </script>
</body>
